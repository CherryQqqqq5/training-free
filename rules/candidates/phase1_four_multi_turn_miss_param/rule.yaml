patch_id: phase1_four_multi_turn_miss_param
rules:
- rule_id: rule_global_no_tool_empty_tool_call_v1
  priority: 100
  enabled: true
  trigger:
    tool_names: []
    error_types:
    - empty_tool_call
    category_patterns: []
  scope:
    tool_names: []
    patch_sites:
    - tool_guard
    - verification_hook
    - fallback_router
  action:
    prompt_fragments:
    - When tools are available and the request is actionable from the current conversation
      state, emit the next tool call instead of replying with explanatory prose.
    - Do not ask the user to repeat or reconfirm information that is already available
      from prior turns, tool outputs, or the current working state.
    - If you emit tool calls in a response, keep the response focused on those tool
      calls and avoid adding a free-form status summary in the same message.
    prompt_injection:
      fragments: []
      position: prepend_system
    arg_sanitizer: {}
    tool_guard:
      enabled: true
      on_violation: record
      on_unknown_tool: record
      on_empty_tool_call: record
      assistant_message: null
    verification:
      require_known_tool: false
      require_object_args: false
      require_required_fields: false
      require_known_fields: false
      require_type_match: false
      max_repairs: null
    fallback_router:
      strategy: record_only
      assistant_message: null
      on_issue_kinds:
      - empty_tool_call
  validation_contract:
    require_known_tool: false
    require_object_args: false
    require_required_fields: false
    require_known_fields: false
    require_type_match: false
    max_repairs: null
  retention:
    promote_to: rules/accepted
    reject_to: rules/rejected
    keep_in_candidates: true
- rule_id: rule_global_no_tool_hallucinated_completion_v1
  priority: 100
  enabled: true
  trigger:
    tool_names: []
    error_types:
    - hallucinated_completion
    category_patterns: []
  scope:
    tool_names: []
    patch_sites:
    - tool_guard
    - verification_hook
    - fallback_router
  action:
    prompt_fragments:
    - Do not claim that work has already started or completed unless you emit the
      corresponding tool call in the same response.
    - If a tool is required, emit the tool call directly instead of promising results
      that have not been requested yet.
    - If you emit tool calls in a response, keep the response focused on those tool
      calls and avoid adding a free-form status summary in the same message.
    prompt_injection:
      fragments: []
      position: prepend_system
    arg_sanitizer: {}
    tool_guard:
      enabled: true
      on_violation: record
      on_unknown_tool: record
      on_empty_tool_call: record
      assistant_message: null
    verification:
      require_known_tool: false
      require_object_args: false
      require_required_fields: false
      require_known_fields: false
      require_type_match: false
      max_repairs: null
    fallback_router:
      strategy: record_only
      assistant_message: null
      on_issue_kinds:
      - hallucinated_completion
  validation_contract:
    require_known_tool: false
    require_object_args: false
    require_required_fields: false
    require_known_fields: false
    require_type_match: false
    max_repairs: null
  retention:
    promote_to: rules/accepted
    reject_to: rules/rejected
    keep_in_candidates: true

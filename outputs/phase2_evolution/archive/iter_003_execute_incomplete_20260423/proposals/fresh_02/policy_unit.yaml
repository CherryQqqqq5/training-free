policy_units:
- name: policy_rule_global_no_tool_post_tool_prose_summary_v1
  rule_id: rule_global_no_tool_post_tool_prose_summary_v1
  trigger:
    error_types:
    - post_tool_prose_summary
    request_predicates: []
    category_patterns:
    - verification_hook
  recommended_tools: []
  continue_condition: prior tool outputs already provide enough local evidence for
    the next grounded tool action
  stop_condition: do not stop with a prose summary immediately after a sufficient
    tool result while another grounded action remains
  forbidden_terminations:
  - prose_only_no_tool_termination
  evidence_requirements:
  - prior_tool_outputs_present
  confidence: 0.8
  source_failure_signature:
    stage: POST_TOOL
    type: POST_TOOL_PROSE_SUMMARY
    tool_schema_hash: '*'
    literals_pattern: no_explicit_literals

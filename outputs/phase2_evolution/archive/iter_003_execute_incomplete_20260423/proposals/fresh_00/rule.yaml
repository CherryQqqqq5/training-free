patch_id: fresh_00
rules:
- rule_id: rule_global_no_tool_actionable_no_tool_decision_prior_explicit_literals_present_prior_tool_outputs_present_tools_available_v1
  priority: 100
  enabled: true
  trigger:
    tool_names: []
    error_types:
    - actionable_no_tool_decision
    category_patterns: []
    request_predicates:
    - prior_explicit_literals_present
    - prior_tool_outputs_present
    - tools_available
  scope:
    tool_names: []
    patch_sites:
    - prompt_injector
    - policy_executor
  action:
    prompt_fragments:
    - When tools are available and the current request already contains enough local
      evidence to continue, emit the next tool call instead of ending the turn with
      explanatory prose.
    - Do not end a tool-enabled turn with prose-only status updates when the next
      action can be grounded from the current request, prior explicit literals, or
      prior tool outputs.
    - Reuse explicit file names, paths, identifiers, or quoted literals already present
      in the request context before asking for clarification or stopping.
    - Use prior tool outputs as grounding for the next tool call instead of switching
      into natural-language explanation.
    prompt_injection:
      fragments:
      - When tools are available and the current request already contains enough local
        evidence to continue, emit the next tool call instead of ending the turn with
        explanatory prose.
      - Do not end a tool-enabled turn with prose-only status updates when the next
        action can be grounded from the current request, prior explicit literals,
        or prior tool outputs.
      - Reuse explicit file names, paths, identifiers, or quoted literals already
        present in the request context before asking for clarification or stopping.
      - Use prior tool outputs as grounding for the next tool call instead of switching
        into natural-language explanation.
      position: prepend_system
    decision_policy:
      request_predicates:
      - prior_explicit_literals_present
      - prior_tool_outputs_present
      - tools_available
      recommended_tools: []
      continue_condition: tools remain available and locally grounded evidence supports
        another tool action
      stop_condition: do not stop with prose-only narration while the matched local
        continuation evidence still holds
      forbidden_terminations:
      - prose_only_no_tool_termination
      evidence_requirements:
      - prior_explicit_literals_present
      - prior_tool_outputs_present
      - tools_available
    arg_sanitizer: {}
    tool_guard:
      enabled: true
      on_violation: record
      on_unknown_tool: record
      on_empty_tool_call: record
      assistant_message: null
    verification:
      require_known_tool: false
      require_object_args: false
      require_required_fields: false
      require_known_fields: false
      require_type_match: false
      max_repairs: null
      forbidden_terminations:
      - prose_only_no_tool_termination
      evidence_requirements:
      - prior_explicit_literals_present
      - prior_tool_outputs_present
      - tools_available
    fallback_router:
      strategy: record_only
      assistant_message: null
      on_issue_kinds:
      - actionable_no_tool_decision
  validation_contract:
    require_known_tool: true
    require_object_args: true
    require_required_fields: true
    require_known_fields: true
    require_type_match: true
    max_repairs: null
    forbidden_terminations: []
    evidence_requirements: []
  retention:
    promote_to: rules/accepted
    reject_to: rules/rejected
    keep_in_candidates: true

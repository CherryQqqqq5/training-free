timeout_sec: 120

upstream:
  # Matches GRC_UPSTREAM_PROFILE default; use novacode profile in YAML + env if needed.
  active_profile: "openrouter"
  base_url: "https://YOUR_UPSTREAM_OPENAI_COMPATIBLE_ENDPOINT/v1"
  api_key_env: "OPENAI_API_KEY"
  model: "gpt-5.4"
  profiles:
    novacode:
      base_url_env: "NOVACODE_BASE_URL"
      base_url: "https://ai.novacode.top/v1"
      api_key_env: "NOVACODE_API_KEY"
      model: "gpt-5.4"
    openrouter:
      base_url_env: "OPENROUTER_BASE_URL"
      base_url: "https://openrouter.ai/api/v1"
      api_key_env: "OPENROUTER_API_KEY"
      model: "grok-3"
      http_referer_env: "OPENROUTER_HTTP_REFERER"
      title_env: "OPENROUTER_X_TITLE"
      default_title: "golden-rule-compiler"

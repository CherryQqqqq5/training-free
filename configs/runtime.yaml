timeout_sec: 120

runtime_policy:
  # Keep BFCL online experiments conservative: mine/trace can classify finer no-tool
  # categories, but runtime should not rewrite responses for these classes by default.
  record_only_no_tool_kinds:
    - clarification_request
    - unsupported_request
    - hallucinated_completion
    - malformed_output
    - natural_language_termination

upstream:
  # Matches GRC_UPSTREAM_PROFILE default; use novacode profile in YAML + env if needed.
  active_profile: "novacode"
  base_url: "https://YOUR_UPSTREAM_OPENAI_COMPATIBLE_ENDPOINT/v1"
  api_key_env: "OPENAI_API_KEY"
  model: "gpt-5.2"
  profiles:
    novacode:
      base_url_env: "NOVACODE_BASE_URL"
      base_url: "https://apicz.boyuerichdata.com/v1"
      api_key_env: "NOVACODE_API_KEY"
      model: "gpt-5.2"
